services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pickle_adminlte_session
      POSTGRES_PASSWORD: pickle
    ports:
      - "55532:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pickle_adminlte_session"]
      interval: 1s
      timeout: 5s
      retries: 20
    volumes:
      - pickle-adminlte-session-data:/var/lib/postgresql/data

volumes:
  pickle-adminlte-session-data:
